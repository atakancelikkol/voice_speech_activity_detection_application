<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>VAD Comparison</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>VAD Comparison</h1>
  <span id="liveBadge">idle</span>
  <div id="recorder">
    <span id="recHint"></span>
    <div id="recLevel"><div id="recLevelFill"></div></div>
    <select id="imprintSel" data-tip="Mic/upload sesine telefon G.711 companding damgası vurur, böylece engine'ler production VAD'ın hatta gördüğünü görür (Türkiye = A-law)">
      <option value="">no companding</option>
      <option value="alaw">A-law (PCMA)</option>
      <option value="ulaw">&mu;-law (PCMU)</option>
    </select>
    <button id="wavBtn" disabled data-tip="Bir WAV veya ham s16le/8k PCM dosyası seç ve analiz et">&#128193; WAV file…</button>
    <input type="file" id="wavFileInput" accept=".wav,audio/wav,audio/x-wav,.raw,.pcm,.sw,.s16,.lpcm,.l16,application/octet-stream" style="display:none">
    <button id="recordBtn" disabled data-tip="Kaydı başlat/durdur — mikrofona konuş, durdurmak için tekrar tıkla; tüm etkin engine'ler canlı çalışır">&#127908; Record</button>
  </div>
</header>
<div id="layout">
  <aside>
    <h2>Sessions</h2>
    <div class="sessionFilter">
      <input type="date" id="sessionDate" data-tip="Yalnızca bu güne ait kayıtları göster">
      <button id="sessionDateClear" data-tip="Tüm günlerin kayıtlarını göster">All</button>
    </div>
    <ul id="sessionList"></ul>
  </aside>
  <main>
    <div id="toolbar">
      <span class="title" id="sessionTitle">no session</span>
      <audio id="player" controls style="display:none"></audio>
      <button id="reanalyzeBtn" style="display:none" data-tip="Tüm etkin engine'leri bu kayıt üzerinde mevcut parametrelerle yeniden çalıştır">Re-analyze all</button>
      <button id="followBtn" class="on" data-tip="Canlı çağrı sırasında görünümü en yeni sese kaydırılmış tut">Follow live</button>
      <button id="fitBtn" data-tip="Timeline'ı tüm kaydı gösterecek şekilde uzaklaştır">Fit</button>
    </div>
    <div id="timelineWrap"><canvas id="timeline"></canvas></div>
  </main>
  <aside class="right">
    <h2>Audio Enhancer</h2>
    <p class="panelNote">Recognizer'a (STT) gönderilen sesi temizler, UniMRCP gibi. VAD engine'lerini etkilemez — duymak için “Apply &amp; play enhanced”e bas.</p>
    <div id="enhancerPanel"></div>
    <h2>Engines</h2>
    <div id="enginePanel"></div>
  </aside>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
