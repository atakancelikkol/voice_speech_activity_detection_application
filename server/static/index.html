<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>VAD Comparison</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>VAD Comparison</h1>
  <span id="liveBadge">idle</span>
  <div id="recorder">
    <span id="recHint"></span>
    <div id="recLevel"><div id="recLevelFill"></div></div>
    <button id="wavBtn" disabled title="Pick a WAV file and analyze it through the same SIP path">&#128193; WAV file…</button>
    <input type="file" id="wavFileInput" accept=".wav,audio/wav,audio/x-wav,.raw,.pcm,.sw,.s16,.lpcm,.l16,application/octet-stream" style="display:none">
    <button id="recordBtn" disabled>&#127908; Record</button>
  </div>
</header>
<div id="layout">
  <aside>
    <h2>Sessions</h2>
    <div class="sessionFilter">
      <input type="date" id="sessionDate" title="Show only recordings from this day">
      <button id="sessionDateClear" title="Show recordings from all days">All</button>
    </div>
    <ul id="sessionList"></ul>
  </aside>
  <main>
    <div id="toolbar">
      <span class="title" id="sessionTitle">no session</span>
      <audio id="player" controls style="display:none"></audio>
      <button id="reanalyzeBtn" style="display:none" title="Re-run all enabled engines over this recording with the current parameters">Re-analyze all</button>
      <button id="annotateBtn">Annotate</button>
      <button id="saveAnnoBtn" style="display:none">Save annotations</button>
      <button id="followBtn" class="on">Follow live</button>
      <button id="fitBtn">Fit</button>
    </div>
    <div id="timelineWrap"><canvas id="timeline"></canvas></div>
  </main>
  <aside class="right">
    <h2>Audio Enhancer</h2>
    <p class="panelNote">Cleans the audio sent to the recognizer (STT), like UniMRCP. Does not affect the VAD engines — use “Apply &amp; play enhanced” to hear it.</p>
    <div id="enhancerPanel"></div>
    <h2>Engines</h2>
    <div id="enginePanel"></div>
    <div id="metrics"></div>
  </aside>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
